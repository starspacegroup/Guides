<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Nebula rings -->
    <ellipse cx="0" cy="0" rx="140" ry="45" fill="none" stroke="#7c3aed" stroke-width="4" opacity="0.7" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="120" ry="40" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.5" transform="rotate(15)"/>
    <!-- Core star -->
    <circle cx="0" cy="0" r="28" fill="#a855f7" opacity="0.9"/>
    <circle cx="0" cy="0" r="18" fill="#c4b5fd" opacity="0.8"/>
    <circle cx="0" cy="0" r="9" fill="white" opacity="0.95"/>
  </g>
  <!-- Small stars -->
  <circle cx="80" cy="80" r="3" fill="white" opacity="0.7"/>
  <circle cx="430" cy="100" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="100" cy="420" r="2" fill="white" opacity="0.5"/>
  <circle cx="400" cy="400" r="3" fill="white" opacity="0.7"/>
  <circle cx="256" cy="60" r="2" fill="white" opacity="0.4"/>
  <circle cx="450" cy="256" r="2.5" fill="white" opacity="0.5"/>
</svg>
